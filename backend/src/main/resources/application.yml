spring:
  application:
    name: promonts-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        registration:
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID:ba630253-585b-4120-8e51-bd2f7b146701}
            client-secret: ${MICROSOFT_CLIENT_SECRET:Yu48Q~zL0KSveTKl1QvHq94y~jMu6pxxLkT2~b_z}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
              - offline_access
              - Mail.Read
              - Mail.Send
              - User.Read
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/bee9c342-a775-4fc4-9f88-85472fbc9a97/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/bee9c342-a775-4fc4-9f88-85472fbc9a97/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/bee9c342-a775-4fc4-9f88-85472fbc9a97/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

jwt:
  secret: ${JWT_SECRET:promonts-mvp-secret-key-change-this-in-production-2026}
  expiration: 86400000 # 24시간

file:
  upload-dir: uploads/materials
  submission-dir: uploads/submissions
  chat-dir: uploads/chat

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

microsoft:
  client-id: ${MICROSOFT_CLIENT_ID:ba630253-585b-4120-8e51-bd2f7b146701}
  client-secret: ${MICROSOFT_CLIENT_SECRET:Yu48Q~zL0KSveTKl1QvHq94y~jMu6pxxLkT2~b_z}
  tenant-id: ${MICROSOFT_TENANT_ID:bee9c342-a775-4fc4-9f88-85472fbc9a97}
  redirect-uri: ${MICROSOFT_REDIRECT_URI:http://localhost:8080/login/oauth2/code/microsoft}

---
# ===========================
# 개발 환경 (dev)
# ===========================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:promonts
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

---
# ===========================
# 프로덕션 환경 (prod)
# ===========================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  h2:
    console:
      enabled: false
